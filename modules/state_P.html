<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:"Microsoft YaHei",sans-serif;display:flex;flex-direction:column;align-items:center;height:100vh;overflow:hidden;padding:6px 0 0}
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:4px}
button{padding:5px 14px;border:none;border-radius:16px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.b-pos{background:#e74c3c;color:#fff}.b-neg{background:#3498db;color:#fff}
.b-auto{background:#1a1a2e;color:#fff}.b-auto.on{background:#27ae60}
.badge{padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;background:#e74c3c;color:#fff}
.spd{font-size:11px;color:#666;display:flex;align-items:center;gap:5px}
input[type=range]{width:70px}
.info{font-size:11px;color:#555;text-align:center;min-height:15px}
svg{flex:1;min-height:0;width:100%;height:100%}
@keyframes march{to{stroke-dashoffset:-24}}
.fl{stroke-dasharray:10 6;stroke-linecap:round;stroke-linejoin:round;fill:none;animation:march .5s linear infinite}
.fg{stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.12}
</style>
</head>

<div class="ctrl">
  <span class="badge">P 态 — 正电平 +Vdc/2</span>

  <span class="spd">速度<input type="range" id="spd" min="0.3" max="3" step="0.1" value="1" oninput="setSpd(this.value)"></span>
</div>
<div class="info" id="info">正向电流：P → T1 → T2 → AC输出，T6 钳位 node_B 至 O 电位</div>

<script>
var dir='pos', auto=false, timer=null;
function setSpd(v){
  var d=(1/parseFloat(v)).toFixed(2)+'s';
  document.querySelectorAll('.fl').forEach(function(e){e.style.animationDuration=d});
}
function setDir(d){
  dir=d;
  var pos=d==='pos';
  ['pfg','pfl','t6g','t6l'].forEach(function(id){
    document.getElementById(id).style.display=pos?'':'none';
  });
  ['nfg','nfl'].forEach(function(id){
    document.getElementById(id).style.display=pos?'none':'';
  });
  document.getElementById('ioLbl').textContent=pos?'io > 0 →':'← io < 0';
  document.getElementById('info').textContent=pos
    ?'正向电流：P → T1 → T2 → AC输出，T6 钳位 node_B 至 O 电位'
    :'反向电流：AC → D2(T2体二极管) → D1(T1体二极管) → P 母线';
  // 反向时体二极管高亮
  var dc='#06b6d4', doff='#bbb';
  ['T1d1','T1d2','T1d3','T1d4','T2d1','T2d2','T2d3','T2d4'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.setAttribute('stroke',pos?doff:dc);
  });
  ['T1d3','T2d3'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.setAttribute('fill',pos?'none':'rgba(6,182,212,.15)');
  });
}
function toggleAuto(){
  auto=!auto;
  var btn=document.getElementById('btnA');
  if(auto){btn.textContent='⏸ 停';btn.classList.add('on');
    timer=setInterval(function(){setDir(dir==='pos'?'neg':'pos')},2000);
  }else{btn.textContent='⏵ 自动';btn.classList.remove('on');clearInterval(timer);}
}
setDir('pos');
</script>
