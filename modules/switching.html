<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PN切换过渡状态分析</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
.header {
  background: #16213e; padding: 8px 16px;
  border-bottom: 1px solid #0f3460; flex-shrink: 0;
}
.header h2 { font-size: 14px; color: #a8d8ea; }
.header p  { font-size: 10px; color: #666; margin-top: 1px; }

.scenario-bar {
  display: flex; gap: 8px; padding: 7px 16px;
  background: #16213e; border-bottom: 1px solid #0f3460;
  flex-shrink: 0; flex-wrap: wrap;
}
.scenario-btn {
  padding: 5px 13px; border: 1px solid #0f3460; border-radius: 4px;
  background: #1a1a2e; color: #aaa; cursor: pointer; font-size: 12px;
  transition: all .2s;
}
.scenario-btn:hover { border-color: #a8d8ea; color: #a8d8ea; }
.scenario-btn.active { background: #0f3460; border-color: #a8d8ea; color: #a8d8ea; font-weight: 600; }

.main-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; padding: 8px 14px; gap: 8px; min-height: 0;
}

/* ── carrier panel ── */
.carrier-panel {
  flex: 0 0 42%; background: #16213e; border: 1px solid #0f3460;
  border-radius: 6px; display: flex; flex-direction: column; min-height: 0;
}
.panel-title { font-size: 11px; color: #888; padding: 4px 10px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
#carrierCanvas { flex: 1; width: 100%; display: block; min-height: 0; }

/* ── bottom row ── */
.bottom-row {
  flex: 1; display: flex; gap: 8px; min-height: 0;
}

/* gate waveform */
.wave-panel {
  flex: 1.4; background: #16213e; border: 1px solid #0f3460;
  border-radius: 6px; display: flex; flex-direction: column; min-width: 0;
}
#waveCanvas { flex: 1; width: 100%; display: block; min-height: 0; }

/* gate table */
.table-panel {
  flex: 1; background: #16213e; border: 1px solid #0f3460;
  border-radius: 6px; overflow: auto; min-width: 0;
}
.gate-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.gate-table th {
  background: #0f3460; color: #a8d8ea; padding: 5px 6px;
  text-align: center; font-weight: 600; border: 1px solid #1a3a6a; font-size: 10px;
  position: sticky; top: 0; z-index: 1;
}
.gate-table td { padding: 6px 6px; text-align: center; border: 1px solid #1a3a6a; font-weight: 600; font-size: 11px; }
.sw-label { color: #ccc; font-weight: 700; font-size: 12px; }
.cell-p  { background: rgba(220,60,60,.35);  color: #ff8a8a; }
.cell-n  { background: rgba(60,120,220,.35); color: #88b4ff; }
.cell-t  { background: rgba(220,160,40,.40); color: #ffd070; }
.cell-off{ background: rgba(30,30,50,.6);    color: #444; }

/* seq strip */
.seq-strip {
  background: #16213e; border: 1px solid #0f3460; border-radius: 6px;
  padding: 6px 12px; flex-shrink: 0; font-size: 11px; display: flex; align-items: flex-start; gap: 12px;
}
.seq-states { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.ss { padding: 2px 9px; border-radius: 3px; font-weight: 700; font-size: 12px; }
.sa { color: #555; font-size: 12px; }
.sp { background: rgba(220,60,60,.3);  color: #ff8a8a; border:1px solid #cc3030; }
.sn { background: rgba(60,120,220,.3); color: #88b4ff; border:1px solid #3060cc; }
.st { background: rgba(220,160,40,.3); color: #ffd070; border:1px solid #cc9020; }
.seq-desc { color: #999; font-size: 10px; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <h2>方案B — PN 切换过渡状态分析</h2>
  <p>顶部图：载波三角 + 调制波前/后瞬时值 → 推导发波驱动逻辑（OU₁/OL₁ 为零电压换流过渡态）</p>
</div>

<div class="scenario-bar">
  <button class="scenario-btn active" data-case="0">P → N · 波峰装载</button>
  <button class="scenario-btn"        data-case="1">P → N · 波谷装载</button>
  <button class="scenario-btn"        data-case="2">N → P · 波峰装载</button>
  <button class="scenario-btn"        data-case="3">N → P · 波谷装载</button>
</div>

<div class="main-area">

  <div class="carrier-panel">
    <div class="panel-title">① 载波 & 调制波瞬时值比较 → 推导开关状态</div>
    <canvas id="carrierCanvas"></canvas>
  </div>

  <div class="bottom-row">
    <div class="wave-panel">
      <div class="panel-title">② 各管驱动波形（由①推导）</div>
      <canvas id="waveCanvas"></canvas>
    </div>
    <div class="table-panel">
      <table class="gate-table" id="gateTable"></table>
    </div>
  </div>

  <div class="seq-strip">
    <div class="seq-states" id="seqStates"></div>
    <div class="seq-desc"   id="seqDesc"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  Case data
// ═══════════════════════════════════════════════════════
const CASES = [
  {
    label: 'P → N · 波峰装载',
    phases: ['P','OU₁','N','OL₁','N'],
    T1:[1,0,0,0,0], T2:[1,1,0,0,0], T3:[0,0,1,1,1],
    T4:[0,0,1,0,1], T5:[0,1,1,1,1], T6:[1,1,0,1,0],
    // Carrier: peak at center (0→1→0).  Loading moment: x=0.5
    loadShape: 'peak',          // carrier1(t) peaks at t=0.5
    vA: +0.60,                  // vref before loading
    vB: -0.60,                  // vref after loading
    // Phase boundary fractions (0..1) within the display window
    // Derived from carrier intersection with vref values
    // Left half:  carrier crosses vA=0.6 at t=0.30 → P/OU boundary
    // Right half: carrier2 crosses vB=-0.6 at t=0.70 → OL/N boundary
    pBounds: [0, 0.30, 0.50, 0.70, 0.84, 1.0],
    desc: '波峰时调制波 vref 从 +0.60 跳变到 −0.60。\n左半周期：vref > 载波 → P；载波超过 0.60 → 插入 OU₁ 过渡。\n右半周期：载波谷侧 carrier₂ < −0.60 → 先呈 OL，插入 OL₁ 后跳 N 稳态。'
  },
  {
    label: 'P → N · 波谷装载',
    phases: ['OU₁','P','OL₁','N','OL₁'],
    T1:[0,1,0,0,0], T2:[1,1,0,0,0], T3:[0,0,1,1,1],
    T4:[0,0,0,1,0], T5:[1,0,1,1,1], T6:[1,1,1,0,1],
    loadShape: 'valley',        // carrier peaks at edges, valley at 0.5
    vA: +0.60,
    vB: -0.60,
    // Left half:  carrier falls 1→0; crosses vA=0.6 at t=0.20 → OU before P
    // Right half: carrier2 rises 0→-1; crosses vB=-0.6 at t=0.80 → OL then OL₁
    pBounds: [0, 0.20, 0.50, 0.67, 0.82, 1.0],
    desc: '波谷时调制波 vref 从 +0.60 跳变到 −0.60。\n左半周期（载波下降）：载波 > 0.60 → OU₁；载波 < 0.60 → P 稳态。\n右半周期（载波上升）：先 OL₁ 过渡，再 N 稳态，结束再次 OL₁ 预备下次切换。'
  },
  {
    label: 'N → P · 波峰装载',
    phases: ['OL₁','N','OU₁','P','OU₁'],
    T1:[0,0,0,1,0], T2:[0,0,1,1,1], T3:[1,1,0,0,0],
    T4:[0,1,0,0,0], T5:[1,1,1,0,1], T6:[1,0,1,1,1],
    loadShape: 'peak',
    vA: -0.60,
    vB: +0.60,
    // Left half:  carrier2 crosses vA=-0.6 at t=0.30 → N/OL boundary → OL₁ inserted
    // Right half: carrier1 crosses vB=0.6 at t=0.70 → OU₁ then P
    pBounds: [0, 0.18, 0.50, 0.70, 0.84, 1.0],
    desc: '波峰时调制波 vref 从 −0.60 跳变到 +0.60。\n左半周期：vref < carrier₂ → N；carrier₂ 超越 −0.60 → 插入 OL₁ 过渡。\n右半周期：载波超过 0.60 → OU₁ 过渡 → P 稳态，结尾再次 OU₁ 预备续电平。'
  },
  {
    label: 'N → P · 波谷装载',
    phases: ['N','OL₁','P','OU₁','P'],
    T1:[0,0,1,0,1], T2:[0,0,1,1,1], T3:[1,1,0,0,0],
    T4:[1,0,0,0,0], T5:[1,1,0,1,0], T6:[0,1,1,1,1],
    loadShape: 'valley',
    vA: -0.60,
    vB: +0.60,
    // Left half:  carrier2 crosses vA=-0.6 at t=0.20 → insert OL₁ before P
    // Right half: carrier1 crosses vB=0.6 at t=0.80 → P then OU₁
    pBounds: [0, 0.30, 0.50, 0.70, 0.84, 1.0],
    desc: '波谷时调制波 vref 从 −0.60 跳变到 +0.60。\n左半周期（载波下降）：vref < carrier₂ → N；接近谷值插入 OL₁ 过渡。\n右半周期（载波上升）：P 稳态，载波超过 0.60 → OU₁ 过渡 → P 续保。'
  }
];

// ═══════════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════════
function stateType(s) {
  if (s==='P')  return 'p';
  if (s==='N')  return 'n';
  return 't'; // OU₁, OL₁
}

// Carrier functions (t ∈ [0,1])
function carrier1(t, shape) {
  // shape='peak':   triangle 0→1→0
  // shape='valley': triangle 1→0→1
  const tri = t < 0.5 ? 2*t : 2*(1-t); // 0→1→0
  return shape === 'peak' ? tri : 1 - tri;
}
function carrier2(t, shape) { return -carrier1(t, shape); }

// Map voltage → pixel y within a given band
function vy(v, yMid, halfH) { return yMid - v * halfH; }

// ═══════════════════════════════════════════════════════
//  Render gate table
// ═══════════════════════════════════════════════════════
function renderTable(c) {
  const tbl = document.getElementById('gateTable');
  const sws = ['T1','T2','T3','T4','T5','T6'];
  const data = {T1:c.T1,T2:c.T2,T3:c.T3,T4:c.T4,T5:c.T5,T6:c.T6};
  let h = '<thead><tr><th>开关</th>';
  c.phases.forEach((ph,i)=>{
    const t=stateType(ph);
    const cls=t==='p'?'cell-p':t==='n'?'cell-n':'cell-t';
    h+=`<th class="${cls}">P${i+1}<br>${ph}</th>`;
  });
  h+='</tr></thead><tbody>';
  sws.forEach(sw=>{
    h+=`<tr><td class="sw-label">${sw}</td>`;
    data[sw].forEach((v,i)=>{
      const ph=c.phases[i]; const t=stateType(ph);
      const cls = v ? (t==='p'?'cell-p':t==='n'?'cell-n':'cell-t') : 'cell-off';
      h+=`<td class="${cls}">${v?'ON':'OFF'}</td>`;
    });
    h+='</tr>';
  });
  tbl.innerHTML=h+'</tbody>';
}

// ═══════════════════════════════════════════════════════
//  Render sequence strip
// ═══════════════════════════════════════════════════════
function renderSeq(c) {
  let h='';
  c.phases.forEach((ph,i)=>{
    if(i>0) h+='<span class="sa">→</span>';
    const t=stateType(ph);
    h+=`<span class="ss ${t==='p'?'sp':t==='n'?'sn':'st'}">${ph}</span>`;
  });
  document.getElementById('seqStates').innerHTML=h;
  document.getElementById('seqDesc').textContent=c.desc;
}

// ═══════════════════════════════════════════════════════
//  Draw carrier comparison diagram (top canvas)
// ═══════════════════════════════════════════════════════
function drawCarrier(c) {
  const cv = document.getElementById('carrierCanvas');
  const dpr = devicePixelRatio||1;
  const W=cv.clientWidth, H=cv.clientHeight;
  if(!W||!H) return;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);

  const LP=52, RP=14, TP=20, BP=18;
  const drawW=W-LP-RP, drawH=H-TP-BP;
  const yMid=TP+drawH/2;
  const halfH=drawH/2*0.82;  // ±1 spans this many pixels (leave margin)
  const xScale=t=>LP+t*drawW;
  const yv=v=>vy(v,yMid,halfH);

  // ── background: shade zones based on actual vref comparison ──
  const N_STEPS=400;
  for(let i=0;i<N_STEPS;i++){
    const t0=i/N_STEPS, t1=(i+1)/N_STEPS;
    const t=0.5*(t0+t1);
    const vref = t<0.5 ? c.vA : c.vB;
    const c1=carrier1(t,c.loadShape);
    const c2=carrier2(t,c.loadShape);
    let state;
    if(vref>c1)            state='P';
    else if(vref>0)        state='OU';
    else if(vref>c2)       state='OL';
    else                   state='N';
    ctx.fillStyle=
      state==='P'  ? 'rgba(220,60,60,0.13)':
      state==='N'  ? 'rgba(60,120,220,0.13)':
                     'rgba(80,180,80,0.08)';
    ctx.fillRect(xScale(t0),TP,xScale(t1)-xScale(t0),drawH);
  }

  // ── phase region overlays ──
  c.pBounds.forEach((x0,i)=>{
    if(i===c.pBounds.length-1) return;
    const x1=c.pBounds[i+1];
    const ph=c.phases[i];
    const t=stateType(ph);
    ctx.fillStyle=
      t==='p'?'rgba(220,60,60,0.12)':
      t==='n'?'rgba(60,120,220,0.12)':
              'rgba(220,160,40,0.18)';
    ctx.fillRect(xScale(x0),TP,xScale(x1)-xScale(x0),drawH);
    // phase label at top
    ctx.fillStyle=t==='p'?'#ff8a8a':t==='n'?'#88b4ff':'#ffd070';
    ctx.font='bold 10px Segoe UI';
    ctx.textAlign='center';
    ctx.fillText(ph, xScale((x0+x1)/2), TP+11);
  });

  // ── phase boundary lines ──
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
  ctx.setLineDash([3,3]);
  c.pBounds.slice(1,-1).forEach(x=>{
    ctx.beginPath();
    ctx.moveTo(xScale(x),TP); ctx.lineTo(xScale(x),TP+drawH);
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // ── loading moment vertical line ──
  ctx.strokeStyle='rgba(255,200,50,0.7)'; ctx.lineWidth=1.5;
  ctx.setLineDash([4,3]);
  ctx.beginPath();
  ctx.moveTo(xScale(0.5),TP); ctx.lineTo(xScale(0.5),TP+drawH);
  ctx.stroke(); ctx.setLineDash([]);

  // ── zero line ──
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(LP,yMid); ctx.lineTo(W-RP,yMid); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='9px Segoe UI';
  ctx.textAlign='right'; ctx.fillText('0',LP-3,yMid+3);

  // ── y-axis labels ──
  [1,0.6,-0.6,-1].forEach(v=>{
    const y=yv(v);
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=0.5;
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(LP,y); ctx.lineTo(W-RP,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(200,200,200,0.4)'; ctx.font='8px Segoe UI';
    ctx.textAlign='right';
    ctx.fillText(v.toFixed(1),LP-3,y+3);
  });

  // ── carrier1 line ──
  ctx.strokeStyle='rgba(180,220,255,0.7)'; ctx.lineWidth=1.5; ctx.setLineDash([]);
  ctx.beginPath();
  for(let i=0;i<=N_STEPS;i++){
    const t=i/N_STEPS;
    const x=xScale(t), y=yv(carrier1(t,c.loadShape));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // ── carrier2 line ──
  ctx.strokeStyle='rgba(180,220,255,0.45)'; ctx.lineWidth=1.2;
  ctx.setLineDash([4,3]);
  ctx.beginPath();
  for(let i=0;i<=N_STEPS;i++){
    const t=i/N_STEPS;
    const x=xScale(t), y=yv(carrier2(t,c.loadShape));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // ── vref_before line (left half) ──
  const xLoad=xScale(0.5);
  ctx.strokeStyle= c.vA>0?'rgba(255,120,100,0.9)':'rgba(100,160,255,0.9)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(LP, yv(c.vA)); ctx.lineTo(xLoad, yv(c.vA));
  ctx.stroke();
  // arrow at end
  ctx.fillStyle=ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(xLoad,yv(c.vA));
  ctx.lineTo(xLoad-7,yv(c.vA)-4);
  ctx.lineTo(xLoad-7,yv(c.vA)+4);
  ctx.closePath(); ctx.fill();
  // label
  ctx.font='bold 10px Segoe UI';
  ctx.textAlign='left';
  ctx.fillStyle= c.vA>0?'#ff9980':'#88b4ff';
  ctx.fillText(`vref前 = ${c.vA.toFixed(2)}`, LP+4, yv(c.vA)-5);

  // ── vref_after line (right half) ──
  ctx.strokeStyle= c.vB>0?'rgba(255,120,100,0.9)':'rgba(100,160,255,0.9)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(xLoad, yv(c.vB)); ctx.lineTo(W-RP, yv(c.vB));
  ctx.stroke();
  // arrow at start
  ctx.fillStyle=ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(xLoad,yv(c.vB));
  ctx.lineTo(xLoad+7,yv(c.vB)-4);
  ctx.lineTo(xLoad+7,yv(c.vB)+4);
  ctx.closePath(); ctx.fill();
  // label
  ctx.font='bold 10px Segoe UI';
  ctx.textAlign='right';
  ctx.fillStyle= c.vB>0?'#ff9980':'#88b4ff';
  ctx.fillText(`vref后 = ${c.vB.toFixed(2)}`, W-RP-4, yv(c.vB)-5);

  // ── vref transition arrow (vertical at loading moment) ──
  const yA=yv(c.vA), yB=yv(c.vB);
  ctx.strokeStyle='rgba(255,200,80,0.8)'; ctx.lineWidth=1.5;
  ctx.setLineDash([3,2]);
  ctx.beginPath(); ctx.moveTo(xLoad,yA); ctx.lineTo(xLoad,yB); ctx.stroke();
  ctx.setLineDash([]);
  // arrow head toward new value
  const dir=yB>yA?1:-1;
  ctx.fillStyle='rgba(255,200,80,0.9)';
  ctx.beginPath();
  ctx.moveTo(xLoad,yB);
  ctx.lineTo(xLoad-4,yB-dir*8);
  ctx.lineTo(xLoad+4,yB-dir*8);
  ctx.closePath(); ctx.fill();
  // "装载" label
  ctx.fillStyle='rgba(255,200,80,0.7)'; ctx.font='9px Segoe UI';
  ctx.textAlign='center';
  const labelText=c.loadShape==='peak'?'波峰装载':'波谷装载';
  ctx.fillText(labelText, xLoad, TP+drawH+BP-4);

  // ── legend ──
  ctx.font='9px Segoe UI'; ctx.textAlign='left';
  [['─ 载波₁','rgba(180,220,255,0.7)'],['- - 载波₂','rgba(180,220,255,0.45)']].forEach(([label,col],i)=>{
    ctx.fillStyle=col;
    ctx.fillText(label, LP+4+i*72, TP+drawH+BP-4);
  });

  // ── state zone legend (right) ──
  ctx.textAlign='right';
  [['P 区','rgba(255,120,100,0.8)'],['N 区','rgba(100,160,255,0.7)']].forEach(([label,col],i)=>{
    ctx.fillStyle=col;
    ctx.fillText(label, W-RP-4-i*42, TP+drawH+BP-4);
  });
}

// ═══════════════════════════════════════════════════════
//  Draw gate drive waveforms (bottom canvas)
// ═══════════════════════════════════════════════════════
const GATE_ROWS=[
  {label:'T1',color:'#ff6060'},
  {label:'T2',color:'#60c878'},
  {label:'T3',color:'#60c878',dash:true},
  {label:'T4',color:'#8888ff'},
  {label:'T5',color:'#ffaa30'},
  {label:'T6',color:'#ffaa30',dash:true},
];

function drawWave(c) {
  const cv=document.getElementById('waveCanvas');
  const dpr=devicePixelRatio||1;
  const W=cv.clientWidth, H=cv.clientHeight;
  if(!W||!H) return;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);

  const LP=36, RP=12, TP=18, BP=4;
  const drawW=W-LP-RP, drawH=H-TP-BP;
  const pb=c.pBounds;             // phase boundary fractions
  const nP=c.phases.length;       // =5
  const rowH=drawH/GATE_ROWS.length;
  const sigH=rowH*0.7;
  const data={T1:c.T1,T2:c.T2,T3:c.T3,T4:c.T4,T5:c.T5,T6:c.T6};

  // phase coloured backgrounds (use same pBounds proportions)
  pb.forEach((x0,i)=>{
    if(i===pb.length-1) return;
    const x1=pb[i+1];
    const ph=c.phases[i];
    const t=stateType(ph);
    ctx.fillStyle=
      t==='p'?'rgba(220,60,60,0.07)':
      t==='n'?'rgba(60,120,220,0.07)':
              'rgba(220,160,40,0.10)';
    ctx.fillRect(LP+x0*drawW,TP,(x1-x0)*drawW,drawH);
    // phase label at top
    ctx.fillStyle=t==='p'?'#ff8a8a':t==='n'?'#88b4ff':'#ffd070';
    ctx.font='bold 9px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(ph, LP+(x0+x1)/2*drawW, TP+9);
  });

  // phase grid lines
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=0.8;
  ctx.setLineDash([3,3]);
  pb.forEach(x=>{
    const px=LP+x*drawW;
    ctx.beginPath(); ctx.moveTo(px,TP); ctx.lineTo(px,TP+drawH); ctx.stroke();
  });
  ctx.setLineDash([]);

  GATE_ROWS.forEach((row,ri)=>{
    const arr=data[row.label];
    const yBase=TP+ri*rowH+rowH*0.15;
    const yHigh=yBase, yLow=yBase+sigH;
    const yMid2=(yHigh+yLow)/2;

    // row label
    ctx.fillStyle=row.color; ctx.font='bold 10px Segoe UI'; ctx.textAlign='right';
    ctx.fillText(row.label, LP-3, yMid2+3);

    // baseline
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(LP,yLow); ctx.lineTo(W-RP,yLow); ctx.stroke();

    // digital step waveform
    ctx.strokeStyle=row.color; ctx.lineWidth=1.8;
    ctx.setLineDash(row.dash?[4,3]:[]);
    ctx.beginPath();
    let prevY=arr[0]?yHigh:yLow;
    ctx.moveTo(LP+pb[0]*drawW, prevY);
    for(let i=0;i<nP;i++){
      const x0=LP+pb[i]*drawW, x1=LP+pb[i+1]*drawW;
      const curY=arr[i]?yHigh:yLow;
      if(curY!==prevY){ ctx.lineTo(x0+1,prevY); ctx.lineTo(x0+1,curY); }
      ctx.lineTo(x1,curY);
      prevY=curY;
    }
    ctx.stroke(); ctx.setLineDash([]);

    // ON/OFF labels
    ctx.font='8px Segoe UI'; ctx.textAlign='center';
    arr.forEach((v,i)=>{
      const xc=LP+(pb[i]+pb[i+1])/2*drawW;
      if(v){ ctx.fillStyle=row.color; ctx.fillText('ON',xc,yHigh-3); }
      else { ctx.fillStyle='rgba(120,120,130,0.6)'; ctx.fillText('OFF',xc,yLow+9); }
    });
  });

  // complementary annotations
  ctx.font='8px Segoe UI'; ctx.textAlign='right';
  const annY=(ri)=>TP+ri*rowH+rowH*0.15+sigH/2+3;
  ctx.fillStyle='rgba(200,200,200,0.35)';
  ctx.fillText('= T̄₂', W-RP-2, annY(2));
  ctx.fillText('= T̄₅', W-RP-2, annY(5));
}

// ═══════════════════════════════════════════════════════
//  Main render
// ═══════════════════════════════════════════════════════
let cur=0;
function render(idx){
  const c=CASES[idx];
  renderTable(c); renderSeq(c);
  drawCarrier(c); drawWave(c);
}

// Resize
const ro=new ResizeObserver(()=>{ drawCarrier(CASES[cur]); drawWave(CASES[cur]); });
ro.observe(document.getElementById('carrierCanvas').parentElement);
ro.observe(document.getElementById('waveCanvas').parentElement);

// Buttons
document.querySelectorAll('.scenario-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.scenario-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    cur=parseInt(btn.dataset.case);
    render(cur);
  });
});

render(0);
</script>
</body>
</html>
