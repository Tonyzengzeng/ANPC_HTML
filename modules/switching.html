<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PN切换过渡状态分析</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
.header {
  background: #16213e; padding: 8px 16px;
  border-bottom: 1px solid #0f3460; flex-shrink: 0;
}
.header h2 { font-size: 14px; color: #a8d8ea; }
.header p  { font-size: 10px; color: #666; margin-top: 1px; }

.scenario-bar {
  display: flex; gap: 8px; padding: 7px 16px;
  background: #16213e; border-bottom: 1px solid #0f3460;
  flex-shrink: 0; flex-wrap: wrap;
}
.scenario-btn {
  padding: 5px 13px; border: 1px solid #0f3460; border-radius: 4px;
  background: #1a1a2e; color: #aaa; cursor: pointer; font-size: 12px;
  transition: all .2s;
}
.scenario-btn:hover { border-color: #a8d8ea; color: #a8d8ea; }
.scenario-btn.active { background: #0f3460; border-color: #a8d8ea; color: #a8d8ea; font-weight: 600; }

.main-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; padding: 8px 14px; gap: 8px; min-height: 0;
}

/* ── carrier panel ── */
.carrier-panel {
  flex: 0 0 42%; background: #16213e; border: 1px solid #0f3460;
  border-radius: 6px; display: flex; flex-direction: column; min-height: 0;
}
.panel-title { font-size: 11px; color: #888; padding: 4px 10px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
#carrierCanvas { flex: 1; width: 100%; display: block; min-height: 0; }

/* ── bottom row ── */
.bottom-row {
  flex: 1; display: flex; gap: 8px; min-height: 0;
}

/* gate waveform */
.wave-panel {
  flex: 1.4; background: #16213e; border: 1px solid #0f3460;
  border-radius: 6px; display: flex; flex-direction: column; min-width: 0;
}
#waveCanvas { flex: 1; width: 100%; display: block; min-height: 0; }

/* gate table */
.table-panel {
  flex: 1; background: #16213e; border: 1px solid #0f3460;
  border-radius: 6px; overflow: auto; min-width: 0;
}
.gate-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.gate-table th {
  background: #0f3460; color: #a8d8ea; padding: 5px 6px;
  text-align: center; font-weight: 600; border: 1px solid #1a3a6a; font-size: 10px;
  position: sticky; top: 0; z-index: 1;
}
.gate-table td { padding: 6px 6px; text-align: center; border: 1px solid #1a3a6a; font-weight: 600; font-size: 11px; }
.sw-label { color: #ccc; font-weight: 700; font-size: 12px; }
.cell-p  { background: rgba(220,60,60,.35);  color: #ff8a8a; }
.cell-n  { background: rgba(60,120,220,.35); color: #88b4ff; }
.cell-t  { background: rgba(220,160,40,.40); color: #ffd070; }
.cell-off{ background: rgba(30,30,50,.6);    color: #444; }

/* seq strip */
.seq-strip {
  background: #16213e; border: 1px solid #0f3460; border-radius: 6px;
  padding: 6px 12px; flex-shrink: 0; font-size: 11px; display: flex; align-items: flex-start; gap: 12px;
}
.seq-states { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.ss { padding: 2px 9px; border-radius: 3px; font-weight: 700; font-size: 12px; }
.sa { color: #555; font-size: 12px; }
.sp { background: rgba(220,60,60,.3);  color: #ff8a8a; border:1px solid #cc3030; }
.sn { background: rgba(60,120,220,.3); color: #88b4ff; border:1px solid #3060cc; }
.st { background: rgba(220,160,40,.3); color: #ffd070; border:1px solid #cc9020; }
.seq-desc { color: #999; font-size: 10px; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <h2>方案B — PN 切换过渡状态分析</h2>
  <p>顶部图：载波三角 + 调制波前/后瞬时值 → 推导发波驱动逻辑（OU₁/OL₁ 为零电压换流过渡态）</p>
</div>

<div class="scenario-bar">
  <button class="scenario-btn active" data-case="0">P → N · 波峰装载</button>
  <button class="scenario-btn"        data-case="1">P → N · 波谷装载</button>
  <button class="scenario-btn"        data-case="2">N → P · 波峰装载</button>
  <button class="scenario-btn"        data-case="3">N → P · 波谷装载</button>
</div>

<div class="main-area">

  <div class="carrier-panel">
    <div class="panel-title">① 载波 & 调制波瞬时值比较 → 推导开关状态</div>
    <canvas id="carrierCanvas"></canvas>
  </div>

  <div class="bottom-row">
    <div class="wave-panel">
      <div class="panel-title">② 各管驱动波形（由①推导）</div>
      <canvas id="waveCanvas"></canvas>
    </div>
    <div class="table-panel">
      <table class="gate-table" id="gateTable"></table>
    </div>
  </div>

  <div class="seq-strip">
    <div class="seq-states" id="seqStates"></div>
    <div class="seq-desc"   id="seqDesc"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  Case data
// ═══════════════════════════════════════════════════════
// cmpLines: 3 PWM compare-register lines (blue=T6/T4, green=T2/T3, red=T1/T5)
// visBefore/visAfter: normalised y-position in carrier diagram (0=bottom, 1=top)
// Carrier triangle occupies the same 0-1 range.
// The gap between blue and green after loading creates the OU₁ overlap window.
// The gap between red and bottom   after loading creates the OL₁ overlap window.
const CASES = [
  {
    label: 'P → N · 波峰装载',
    phases: ['P','OU₁','N','OL₁','N'],
    T1:[1,0,0,0,0], T2:[1,1,0,0,0], T3:[0,0,1,1,1],
    T4:[0,0,1,0,1], T5:[0,1,1,1,1], T6:[1,1,0,1,0],
    loadShape: 'peak',   // carrier: 0→1→0, loading at peak (x=0.5)
    // Phase boundary fractions (schematic, equal-ish widths for readability)
    pBounds: [0, 0.50, 0.62, 0.82, 0.91, 1.0],
    // Three compare-register lines
    cmpLines: [
      { label:'T6/T4', color:'#5bc8f5',
        visBefore:0.88, visAfter:0.76,
        regBefore:'65535', regAfter:'64535' },
      { label:'T2/T3', color:'#66cc66',
        visBefore:0.88, visAfter:0.03,
        regBefore:'65535', regAfter:'0' },
      { label:'T1/T5', color:'#ff7070',
        visBefore:0.03, visAfter:0.14,
        regBefore:'0',     regAfter:'100' },
    ],
    desc: '波峰时 T2/T3 比较值从 65535 跳变到 0（绿线大幅下降）→ T3 立即导通。\nT6/T4 比较值仅减 1000（蓝线微降），在装载后载波下降期间短暂保持 T6 导通，与已导通的 T5 形成 OU₁ 重叠窗口。\nT1/T5 比较值从 0 升至 100（红线微升），在载波接近谷值时产生极短的 OL₁ 重叠窗口。'
  },
  {
    label: 'P → N · 波谷装载',
    phases: ['OU₁','P','OL₁','N','OL₁'],
    T1:[0,1,0,0,0], T2:[1,1,0,0,0], T3:[0,0,1,1,1],
    T4:[0,0,0,1,0], T5:[1,0,1,1,1], T6:[1,1,1,0,1],
    loadShape: 'valley', // carrier: 1→0→1, loading at valley (x=0.5)
    pBounds: [0, 0.19, 0.50, 0.64, 0.80, 1.0],
    cmpLines: [
      { label:'T6/T4', color:'#5bc8f5',
        visBefore:0.88, visAfter:0.76,
        regBefore:'65535', regAfter:'64535' },
      { label:'T2/T3', color:'#66cc66',
        visBefore:0.88, visAfter:0.03,
        regBefore:'65535', regAfter:'0' },
      { label:'T1/T5', color:'#ff7070',
        visBefore:0.03, visAfter:0.14,
        regBefore:'0',     regAfter:'100' },
    ],
    desc: '波谷装载：载波从峰值下降时，蓝线（T6/T4=65535）仍高于载波，但最顶部出现短暂超越 → OU₁ 过渡窗口。\n载波降至谷值时装载新值，绿线骤降至 0，T3 立即导通。载波上升后蓝线（64535）很快被超越，进入 N 稳态。\nOL₁ 由红线（0→100）在载波上升初段创建。'
  },
  {
    label: 'N → P · 波峰装载',
    phases: ['OL₁','N','OU₁','P','OU₁'],
    T1:[0,0,0,1,0], T2:[0,0,1,1,1], T3:[1,1,0,0,0],
    T4:[0,1,0,0,0], T5:[1,1,1,0,1], T6:[1,0,1,1,1],
    loadShape: 'peak',
    pBounds: [0, 0.18, 0.50, 0.62, 0.82, 1.0],
    cmpLines: [
      { label:'T6/T4', color:'#5bc8f5',
        visBefore:0.03, visAfter:0.14,
        regBefore:'0',     regAfter:'1000' },
      { label:'T2/T3', color:'#66cc66',
        visBefore:0.03, visAfter:0.88,
        regBefore:'0',     regAfter:'65535' },
      { label:'T1/T5', color:'#ff7070',
        visBefore:0.88, visAfter:0.76,
        regBefore:'65535', regAfter:'64535' },
    ],
    desc: '波峰时 T2/T3 比较值从 0 跳变到 65535（绿线大幅上升）→ T2 立即导通。\nT1/T5 比较值仅减 1000（红线微降），在装载后短暂保持 T5 导通，与已导通的 T6 形成 OU₁ 重叠窗口（与 P→N 对称）。\nT6/T4 从 0 升至 1000（蓝线微升），在载波接近谷值时产生极短 OL₁ 窗口。'
  },
  {
    label: 'N → P · 波谷装载',
    phases: ['N','OL₁','P','OU₁','P'],
    T1:[0,0,1,0,1], T2:[0,0,1,1,1], T3:[1,1,0,0,0],
    T4:[1,0,0,0,0], T5:[1,1,0,1,0], T6:[0,1,1,1,1],
    loadShape: 'valley',
    pBounds: [0, 0.30, 0.50, 0.62, 0.82, 1.0],
    cmpLines: [
      { label:'T6/T4', color:'#5bc8f5',
        visBefore:0.03, visAfter:0.14,
        regBefore:'0',     regAfter:'1000' },
      { label:'T2/T3', color:'#66cc66',
        visBefore:0.03, visAfter:0.88,
        regBefore:'0',     regAfter:'65535' },
      { label:'T1/T5', color:'#ff7070',
        visBefore:0.88, visAfter:0.76,
        regBefore:'65535', regAfter:'64535' },
    ],
    desc: '波谷装载 N→P：载波下降阶段红线（T1/T5=65535）接近顶部，在载波超越红线前有短暂 OL₁ 窗口。\n谷值时绿线（T2/T3）从 0 跳变到 65535，T2 立即导通。\n载波上升后，红线（64535）短暂保持 T5 导通，与新导通的 T6 形成 OU₁ 重叠窗口，随后 P 稳定。'
  }
];

// ═══════════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════════
function stateType(s) {
  if (s==='P')  return 'p';
  if (s==='N')  return 'n';
  return 't'; // OU₁, OL₁
}

// Carrier value (normalised 0-1) for given shape at fraction t ∈ [0,1]
// 'peak':   triangle 0→1→0  (loads new compare value at peak)
// 'valley': triangle 1→0→1  (loads new compare value at valley)
function carrierVal(t, shape) {
  const tri = t < 0.5 ? 2*t : 2*(1-t); // 0→1→0
  return shape === 'peak' ? tri : 1 - tri;
}

// Map normalised value v ∈ [0,1] → pixel y (0=bottom, 1=top of draw band)
function normToY(v, yTop, yBot) { return yBot - v*(yBot-yTop); }

// ═══════════════════════════════════════════════════════
//  Render gate table
// ═══════════════════════════════════════════════════════
function renderTable(c) {
  const tbl = document.getElementById('gateTable');
  const sws = ['T1','T2','T3','T4','T5','T6'];
  const data = {T1:c.T1,T2:c.T2,T3:c.T3,T4:c.T4,T5:c.T5,T6:c.T6};
  let h = '<thead><tr><th>开关</th>';
  c.phases.forEach((ph,i)=>{
    const t=stateType(ph);
    const cls=t==='p'?'cell-p':t==='n'?'cell-n':'cell-t';
    h+=`<th class="${cls}">P${i+1}<br>${ph}</th>`;
  });
  h+='</tr></thead><tbody>';
  sws.forEach(sw=>{
    h+=`<tr><td class="sw-label">${sw}</td>`;
    data[sw].forEach((v,i)=>{
      const ph=c.phases[i]; const t=stateType(ph);
      const cls = v ? (t==='p'?'cell-p':t==='n'?'cell-n':'cell-t') : 'cell-off';
      h+=`<td class="${cls}">${v?'ON':'OFF'}</td>`;
    });
    h+='</tr>';
  });
  tbl.innerHTML=h+'</tbody>';
}

// ═══════════════════════════════════════════════════════
//  Render sequence strip
// ═══════════════════════════════════════════════════════
function renderSeq(c) {
  let h='';
  c.phases.forEach((ph,i)=>{
    if(i>0) h+='<span class="sa">→</span>';
    const t=stateType(ph);
    h+=`<span class="ss ${t==='p'?'sp':t==='n'?'sn':'st'}">${ph}</span>`;
  });
  document.getElementById('seqStates').innerHTML=h;
  document.getElementById('seqDesc').textContent=c.desc;
}

// ═══════════════════════════════════════════════════════
//  Draw carrier comparison diagram (top canvas)
// ═══════════════════════════════════════════════════════
function drawCarrier(c) {
  const cv = document.getElementById('carrierCanvas');
  const dpr = devicePixelRatio||1;
  const W=cv.clientWidth, H=cv.clientHeight;
  if(!W||!H) return;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);

  // Layout
  const LP=46, RP=16, TP=22, BP=20;
  const drawW=W-LP-RP, drawH=H-TP-BP;
  const yTop=TP, yBot=TP+drawH;
  // x/y helpers (normalised 0-1)
  const xp = t => LP + t*drawW;
  const yp = v => normToY(v, yTop, yBot);
  const xLoad = xp(0.5);
  const N = 500;

  // ── 1. Phase region backgrounds ─────────────────────────
  c.pBounds.forEach((x0,i)=>{
    if(i===c.pBounds.length-1) return;
    const x1=c.pBounds[i+1];
    const t=stateType(c.phases[i]);
    ctx.fillStyle=
      t==='p'?'rgba(220,60,60,0.11)':
      t==='n'?'rgba(60,120,220,0.11)':
              'rgba(220,160,40,0.14)';
    ctx.fillRect(xp(x0), yTop, (x1-x0)*drawW, drawH);
  });

  // ── 2. Phase boundary lines ──────────────────────────────
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.8;
  ctx.setLineDash([3,3]);
  c.pBounds.slice(1,-1).forEach(x=>{
    ctx.beginPath(); ctx.moveTo(xp(x),yTop); ctx.lineTo(xp(x),yBot); ctx.stroke();
  });
  ctx.setLineDash([]);

  // ── 3. Phase labels (top) ────────────────────────────────
  ctx.textAlign='center'; ctx.font='bold 10px Segoe UI';
  c.pBounds.forEach((x0,i)=>{
    if(i===c.pBounds.length-1) return;
    const x1=c.pBounds[i+1];
    const t=stateType(c.phases[i]);
    ctx.fillStyle=t==='p'?'#ff8a8a':t==='n'?'#88b4ff':'#ffd070';
    ctx.fillText(c.phases[i], xp((x0+x1)/2), yTop+12);
  });

  // ── 4. Y-axis ticks & horizontal grid ────────────────────
  ctx.font='8px Segoe UI'; ctx.textAlign='right';
  [1.0, 0.75, 0.5, 0.25, 0].forEach(v=>{
    const y=yp(v);
    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=0.5;
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(LP,y); ctx.lineTo(W-RP,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(180,180,180,0.45)';
    ctx.fillText(v===1?'MAX':v===0?'0':`${Math.round(v*65535)}`, LP-3, y+3);
  });

  // ── 5. Carrier fill (shaded area under carrier triangle) ─
  ctx.beginPath();
  ctx.moveTo(xp(0), yBot);
  for(let i=0;i<=N;i++){
    const t=i/N;
    ctx.lineTo(xp(t), yp(carrierVal(t, c.loadShape)));
  }
  ctx.lineTo(xp(1), yBot);
  ctx.closePath();
  ctx.fillStyle='rgba(140,200,255,0.07)';
  ctx.fill();

  // ── 6. Carrier triangle line ─────────────────────────────
  ctx.strokeStyle='rgba(160,210,255,0.65)'; ctx.lineWidth=1.8;
  ctx.setLineDash([]);
  ctx.beginPath();
  for(let i=0;i<=N;i++){
    const t=i/N, x=xp(t), y=yp(carrierVal(t,c.loadShape));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // ── 7. Loading-moment vertical marker ────────────────────
  ctx.strokeStyle='rgba(255,210,60,0.75)'; ctx.lineWidth=1.6;
  ctx.setLineDash([5,3]);
  ctx.beginPath(); ctx.moveTo(xLoad,yTop); ctx.lineTo(xLoad,yBot); ctx.stroke();
  ctx.setLineDash([]);
  // "装载" label at line mid-height
  ctx.fillStyle='rgba(255,210,60,0.85)'; ctx.font='bold 9px Segoe UI';
  ctx.textAlign='center';
  ctx.fillText('比较值', xLoad, yTop+drawH*0.44);
  ctx.fillText('装载', xLoad, yTop+drawH*0.44+11);
  // label below x-axis
  ctx.fillStyle='rgba(255,210,60,0.6)'; ctx.font='8px Segoe UI';
  ctx.fillText(c.loadShape==='peak'?'(波峰)':'(波谷)', xLoad, yBot+BP-4);
  // small note: loading ≠ gate flip
  ctx.fillStyle='rgba(200,200,200,0.45)'; ctx.font='8px Segoe UI';
  ctx.textAlign='left';
  ctx.fillText('装载≠驱动翻转', xLoad+4, yTop+drawH*0.44+22);

  // ── 8. Three compare-register stepped lines ───────────────
  // For each line: horizontal segment before loading, step at xLoad, segment after
  c.cmpLines.forEach((ln, li)=>{
    const yB = yp(ln.visBefore);   // y position before loading
    const yA = yp(ln.visAfter);    // y position after loading

    // -- left half (before loading) --
    ctx.strokeStyle = ln.color + 'cc';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(xp(0), yB);
    ctx.lineTo(xLoad,  yB);
    ctx.stroke();

    // -- vertical step at loading moment --
    ctx.strokeStyle = ln.color + '88';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([3,2]);
    ctx.beginPath();
    ctx.moveTo(xLoad, yB);
    ctx.lineTo(xLoad, yA);
    ctx.stroke();
    ctx.setLineDash([]);

    // -- right half (after loading) --
    ctx.strokeStyle = ln.color + 'cc';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(xLoad, yA);
    ctx.lineTo(xp(1), yA);
    ctx.stroke();

    // -- label on right edge --
    ctx.fillStyle = ln.color;
    ctx.font = 'bold 9px Segoe UI';
    ctx.textAlign = 'left';
    ctx.fillText(ln.label, xp(1)+3, yA+3);

    // -- register value annotations --
    // "before" value: shown near left edge
    ctx.font = '8px Segoe UI';
    ctx.textAlign = 'left';
    ctx.fillStyle = ln.color + 'aa';
    ctx.fillText(ln.regBefore, xp(0.01), yB - 4);
    // "after" value: shown after xLoad on right
    ctx.textAlign = 'right';
    ctx.fillText(ln.regAfter, xp(0.99), yA - 4);

    // -- crossing circles: where carrier line meets this compare line --
    // Find x where carrierVal(x, shape) ≈ vis value (after loading, right half)
    // We search in the right half for a crossing with visAfter
    // (only draw if the carrier actually reaches that level)
    const cv2 = ln.visAfter;
    // For peak shape: carrier falls from 1→0 in right half.  Cross at x=1-cv2/2
    // For valley shape: carrier rises from 0→1 in right half. Cross at x=(cv2+1)/2
    let xCross;
    if(c.loadShape==='peak'){
      xCross = 1 - cv2/2;      // carrier1(x,'peak') = cv2 → x = 1 - cv2/2  (right half)
    } else {
      xCross = (cv2+1)/2;       // carrier1(x,'valley') = cv2 → x = (cv2+1)/2 (right half)
    }
    if(xCross > 0.5 && xCross < 1.0){
      const xc=xp(xCross), yc=yp(cv2);
      ctx.beginPath();
      ctx.arc(xc, yc, 3.5, 0, Math.PI*2);
      ctx.fillStyle = ln.color + 'ee';
      ctx.fill();
      ctx.strokeStyle = '#fff8';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // Also check left half crossing with visBefore
    // For peak shape: carrier rises 0→1 in left half.  Cross at x=visBefore/2
    // For valley shape: carrier falls 1→0 in left half. Cross at x=(1-visBefore)/2
    let xCrossL;
    if(c.loadShape==='peak'){
      xCrossL = ln.visBefore/2;
    } else {
      xCrossL = (1-ln.visBefore)/2;
    }
    if(xCrossL > 0 && xCrossL < 0.5){
      const xc=xp(xCrossL), yc=yp(ln.visBefore);
      ctx.beginPath();
      ctx.arc(xc, yc, 3.5, 0, Math.PI*2);
      ctx.fillStyle = ln.color + 'ee';
      ctx.fill();
      ctx.strokeStyle = '#fff8';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  });

  // ── 9. Overlap window annotations (OU₁ / OL₁) ───────────
  // OU₁ window: between blue and green on the "big-change" side
  // Identify which line makes the big jump and which is the small companion
  const cmpSorted = [...c.cmpLines].sort((a,b)=>
    Math.abs(b.visAfter-b.visBefore) - Math.abs(a.visAfter-a.visBefore));
  const bigLine   = cmpSorted[0];   // green (large change)
  const smallTop  = cmpSorted[1];   // blue  (small change, near top after loading)
  const smallBot  = cmpSorted[2];   // red   (small change, near bottom after loading)

  // The OU₁ window is the gap between smallTop (visBefore) and bigLine (visBefore)
  // when they overlap before loading — draw a narrow bracket on the left half
  // Actually: highlight the OU₁/OL₁ phase bands in the carrier panel with a border
  c.pBounds.forEach((x0,i)=>{
    if(i===c.pBounds.length-1) return;
    if(stateType(c.phases[i])==='t'){   // transition state
      const x1=c.pBounds[i+1];
      ctx.strokeStyle='rgba(255,200,60,0.5)';
      ctx.lineWidth=1;
      ctx.strokeRect(xp(x0)+1, yTop+18, (x1-x0)*drawW-2, drawH-18);
    }
  });

  // ── 10. Legend ────────────────────────────────────────────
  ctx.font='8.5px Segoe UI'; ctx.textAlign='left';
  const lgX=LP+4, lgY=yBot+BP-4;
  // Carrier
  ctx.strokeStyle='rgba(160,210,255,0.65)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(lgX,lgY-3); ctx.lineTo(lgX+18,lgY-3); ctx.stroke();
  ctx.fillStyle='rgba(160,210,255,0.8)';
  ctx.fillText('载波', lgX+21, lgY);
  // Three compare lines
  c.cmpLines.forEach((ln,i)=>{
    const lx=lgX+60+i*68;
    ctx.strokeStyle=ln.color+'cc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(lx,lgY-3); ctx.lineTo(lx+14,lgY-3); ctx.stroke();
    ctx.fillStyle=ln.color;
    ctx.fillText(ln.label, lx+17, lgY);
  });
}

// ═══════════════════════════════════════════════════════
//  Draw gate drive waveforms (bottom canvas)
// ═══════════════════════════════════════════════════════
const GATE_ROWS=[
  {label:'T1',color:'#ff6060'},
  {label:'T2',color:'#60c878'},
  {label:'T3',color:'#60c878',dash:true},
  {label:'T4',color:'#8888ff'},
  {label:'T5',color:'#ffaa30'},
  {label:'T6',color:'#ffaa30',dash:true},
];

function drawWave(c) {
  const cv=document.getElementById('waveCanvas');
  const dpr=devicePixelRatio||1;
  const W=cv.clientWidth, H=cv.clientHeight;
  if(!W||!H) return;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);

  const LP=36, RP=12, TP=18, BP=4;
  const drawW=W-LP-RP, drawH=H-TP-BP;
  const pb=c.pBounds;             // phase boundary fractions
  const nP=c.phases.length;       // =5
  const rowH=drawH/GATE_ROWS.length;
  const sigH=rowH*0.72;
  const sigPad=(rowH-sigH)/2;
  const data={T1:c.T1,T2:c.T2,T3:c.T3,T4:c.T4,T5:c.T5,T6:c.T6};

  // phase coloured backgrounds (use same pBounds proportions)
  pb.forEach((x0,i)=>{
    if(i===pb.length-1) return;
    const x1=pb[i+1];
    const ph=c.phases[i];
    const t=stateType(ph);
    ctx.fillStyle=
      t==='p'?'rgba(220,60,60,0.07)':
      t==='n'?'rgba(60,120,220,0.07)':
              'rgba(220,160,40,0.10)';
    ctx.fillRect(LP+x0*drawW,TP,(x1-x0)*drawW,drawH);
    // phase label at top
    ctx.fillStyle=t==='p'?'#ff8a8a':t==='n'?'#88b4ff':'#ffd070';
    ctx.font='bold 9px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(ph, LP+(x0+x1)/2*drawW, TP+9);
  });

  // phase grid lines
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=0.8;
  ctx.setLineDash([3,3]);
  pb.forEach(x=>{
    const px=LP+x*drawW;
    ctx.beginPath(); ctx.moveTo(px,TP); ctx.lineTo(px,TP+drawH); ctx.stroke();
  });
  ctx.setLineDash([]);

  GATE_ROWS.forEach((row,ri)=>{
    const arr=data[row.label];
    const yHigh=TP+ri*rowH+sigPad;
    const yLow=yHigh+sigH;
    const yMid2=(yHigh+yLow)/2;

    // row label
    ctx.fillStyle=row.color; ctx.font='bold 10px Segoe UI'; ctx.textAlign='right';
    ctx.fillText(row.label, LP-3, yMid2+3);

    // baseline
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(LP,yLow); ctx.lineTo(W-RP,yLow); ctx.stroke();

    // digital step waveform
    ctx.strokeStyle=row.color; ctx.lineWidth=1.8;
    ctx.setLineDash(row.dash?[4,3]:[]);
    ctx.beginPath();
    let prevY=arr[0]?yHigh:yLow;
    ctx.moveTo(LP+pb[0]*drawW, prevY);
    for(let i=0;i<nP;i++){
      const x0=LP+pb[i]*drawW, x1=LP+pb[i+1]*drawW;
      const curY=arr[i]?yHigh:yLow;
      if(curY!==prevY){ ctx.lineTo(x0+1,prevY); ctx.lineTo(x0+1,curY); }
      ctx.lineTo(x1,curY);
      prevY=curY;
    }
    ctx.stroke(); ctx.setLineDash([]);

    // ON/OFF labels
    ctx.font='8px Segoe UI'; ctx.textAlign='center';
    arr.forEach((v,i)=>{
      const xc=LP+(pb[i]+pb[i+1])/2*drawW;
      if(v){ ctx.fillStyle=row.color; ctx.fillText('ON',xc, yHigh+(yLow-yHigh)*0.32); }
      else { ctx.fillStyle='rgba(120,120,130,0.6)'; ctx.fillText('OFF',xc, yLow-(yLow-yHigh)*0.28); }
    });
  });

  // complementary annotations
  ctx.font='8px Segoe UI'; ctx.textAlign='right';
  const annY=(ri)=>TP+ri*rowH+sigPad+sigH/2+3;
  ctx.fillStyle='rgba(200,200,200,0.35)';
  ctx.fillText('= T̄₂', W-RP-2, annY(2));
  ctx.fillText('= T̄₅', W-RP-2, annY(5));
}

// ═══════════════════════════════════════════════════════
//  Main render
// ═══════════════════════════════════════════════════════
let cur=0;
function render(idx){
  const c=CASES[idx];
  renderTable(c); renderSeq(c);
  drawCarrier(c); drawWave(c);
}

// Resize
const ro=new ResizeObserver(()=>{ drawCarrier(CASES[cur]); drawWave(CASES[cur]); });
ro.observe(document.getElementById('carrierCanvas').parentElement);
ro.observe(document.getElementById('waveCanvas').parentElement);

// Buttons
document.querySelectorAll('.scenario-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.scenario-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    cur=parseInt(btn.dataset.case);
    render(cur);
  });
});

render(0);
</script>
