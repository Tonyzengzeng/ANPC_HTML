<!DOCTYPE html>

<text x="260" y="580" fill="#999" font-size="10" text-anchor="middle" font-family="Microsoft YaHei">
  ANPC 单相桥臂拓扑 · 含 IGBT+体二极管 符号 · 绿色=钳位管 · 蓝色=主管

<script>
var tt=document.getElementById('tooltip');
document.querySelectorAll('.hov').forEach(function(el){
  el.addEventListener('mouseenter',function(e){
    var tip=el.getAttribute('data-tip');
    if(!tip)return;
    tt.style.display='block';
    tt.innerHTML=tip.replace(/&#10;/g,'<br>');
  });
  el.addEventListener('mousemove',function(e){
    tt.style.left=(e.clientX+14)+'px';
    tt.style.top=(e.clientY-8)+'px';
  });
  el.addEventListener('mouseleave',function(){tt.style.display='none';});
});
</script>
</body>
