<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:"Microsoft YaHei",sans-serif;display:flex;flex-direction:column;align-items:center;height:100vh;overflow:hidden;padding:6px 0 0}
.ctrl{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:3px}
button{padding:5px 12px;border:none;border-radius:16px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.b-ol{background:#27ae60;color:#fff}.b-ou{background:#16a085;color:#fff}
.b-auto{background:#1a1a2e;color:#fff}.b-auto.on{background:#e67e22}
.badge{padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;background:#27ae60;color:#fff}
.spd{font-size:11px;color:#666;display:flex;align-items:center;gap:5px}
input[type=range]{width:70px}
.info{font-size:11px;color:#555;text-align:center;min-height:15px;padding:0 10px}
@keyframes march{to{stroke-dashoffset:-24}}
.fl{stroke-dasharray:10 6;stroke-linecap:round;stroke-linejoin:round;fill:none;animation:march .5s linear infinite}
.fg{stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.12}
</style>
</head>

<script>
var state='OL', auto=false, timer=null;
var ON_F='rgba(34,197,94,.1)', ON_S='#22c55e', ON_C='#333', ON_TC='#22c55e';
var OFF_F='rgba(75,85,99,.06)', OFF_S='#9ca3af', OFF_C='#aaa', OFF_TC='#9ca3af';
var D_ON='#06b6d4', D_OFF='#bbb', D_OFF_DARK='#ccc';

function sw(name, on, diodeActive){
  var bg=document.getElementById('bg-'+name);
  var lbl=document.getElementById('lbl-'+name);
  var st=document.getElementById('st-'+name);
  var arr=document.getElementById('arr-'+name);
  // Lines in the group with class sw-line
  var g=document.getElementById('g-'+name);
  var lines=g.querySelectorAll('.sw-line');
  if(on){
    bg.setAttribute('fill',ON_F); bg.setAttribute('stroke',ON_S);
    if(lbl){lbl.setAttribute('fill',ON_TC);} if(st){st.textContent='ON';st.setAttribute('fill',ON_TC);}
    if(arr) arr.setAttribute('fill','#333');
    lines.forEach(function(l){l.setAttribute('stroke','#333');});
  } else {
    bg.setAttribute('fill',OFF_F); bg.setAttribute('stroke',OFF_S);
    if(lbl){lbl.setAttribute('fill',OFF_TC);} if(st){st.textContent='OFF';st.setAttribute('fill',OFF_TC);}
    if(arr) arr.setAttribute('fill',OFF_C);
    lines.forEach(function(l){l.setAttribute('stroke',OFF_C);});
  }
  // Diode coloring
  var dc = diodeActive ? D_ON : (on ? D_OFF : D_OFF_DARK);
  var df = diodeActive ? 'rgba(6,182,212,.15)' : 'none';
  var n=name.replace('T','');
  ['D'+n+'w1','D'+n+'bar','D'+n+'tri','D'+n+'w2'].forEach(function(id){
    var el=document.getElementById(id); if(!el)return;
    el.setAttribute('stroke', dc);
  });
  var tri=document.getElementById('D'+n+'tri');
  if(tri) tri.setAttribute('fill', df);
  var lbD=document.getElementById('D'+n+'lbl');
  if(lbD) lbD.setAttribute('fill', dc);
}

function show(ids, vis){
  ids.forEach(function(id){document.getElementById(id).style.display=vis?'':'none';});
}

function setState(s){
  state=s;
  var isOL=(s==='OL');
  var badge=document.getElementById('badge');
  var info=document.getElementById('info');
  badge.textContent = isOL ? 'OL 态 — 上钳位零电平' : 'OU 态 — 下钳位零电平';
  badge.style.background = isOL ? '#27ae60' : '#16a085';
  document.getElementById('ioLbl').textContent = 'Vout = 0';

  if(isOL){
    // T2,T3,T5 ON; T1,T4,T6 OFF
    sw('T1',false,false); sw('T2',true,false); sw('T3',true,false);
    sw('T4',false,false); sw('T5',true,false); sw('T6',false,false);
    // D2, D5 active as body diodes for freewheeling
    sw('T2',true,true); sw('T5',true,true);
    info.textContent='OL：i>0→O经D5→node_A→T2→AC；i<0→AC经D2→node_A→T5→O（T3辅助续流）';
    show(['ol-pos-g','ol-pos-l'],true);
    show(['ol-neg-g','ol-neg-l'],false);
    show(['ou-pos-g','ou-pos-l'],false);
    show(['ou-neg-g','ou-neg-l'],false);
  } else {
    // T3,T4,T6 ON; T1,T2,T5 OFF
    sw('T1',false,false); sw('T2',false,false); sw('T3',true,false);
    sw('T4',true,false);  sw('T5',false,false); sw('T6',true,false);
    // D3, D6 active as body diodes
    sw('T3',true,true); sw('T6',true,true);
    info.textContent='OU：i>0→O经T6→node_B→D3→AC；i<0→AC经T3→node_B→D6→O（T4辅助）';
    show(['ol-pos-g','ol-pos-l'],false);
    show(['ol-neg-g','ol-neg-l'],false);
    show(['ou-pos-g','ou-pos-l'],true);
    show(['ou-neg-g','ou-neg-l'],false);
  }
}

// Cycle through i>0 / i<0 sub-paths
var subDir=true; // true=pos, false=neg
function cycleDir(){
  subDir=!subDir;
  if(state==='OL'){
    show(['ol-pos-g','ol-pos-l'], subDir);
    show(['ol-neg-g','ol-neg-l'], !subDir);
  } else {
    show(['ou-pos-g','ou-pos-l'], subDir);
    show(['ou-neg-g','ou-neg-l'], !subDir);
  }
}

function toggleAuto(){
  auto=!auto; var btn=document.getElementById('btnA');
  if(auto){
    btn.textContent='⏸ 停';btn.classList.add('on');
    timer=setInterval(function(){
      if(Math.random()>0.5) setState(state==='OL'?'OU':'OL');
      else cycleDir();
    },2000);
  }else{btn.textContent='⏵ 交替演示';btn.classList.remove('on');clearInterval(timer);}
}
function setSpd(v){
  var d=(1/parseFloat(v)).toFixed(2)+'s';
  document.querySelectorAll('.fl').forEach(function(e){e.style.animationDuration=d});
}
setState('OL');
</script>
